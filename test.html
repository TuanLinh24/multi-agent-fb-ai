<!DOCTYPE html>
<html>

<body>

<button onclick="send()">
Send
</button>

<p id="output"></p>

<script>

async function send() {

    const response = await fetch(
        "http://127.0.0.1:8000/chat",
        {
            method: "POST",
            headers: {
                "Content-Type":
                "application/json"
            },
            body: JSON.stringify({
                session_id: "1",
                message:
                "Bạn có thể đề xuất cho tôi một đồ uống được không?"
            })
        }
    );

    const reader =
        response.body.getReader();

    const decoder = new TextDecoder();

    let finalText = "";

    while (true) {

        const { done, value } =
            await reader.read();

        if (done) break;

        const chunk =
            decoder.decode(value);

        const matches =
            chunk.match(/data: (.*)/g);

        if (matches) {

            matches.forEach(m => {

                finalText +=
                    m.replace("data: ", "")
                    + " ";

            });

            document
                .getElementById(
                    "output"
                )
                .innerText = finalText;
        }
    }
}

</script>

</body>
</html>
