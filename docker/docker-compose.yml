# Neo4j + Redis + Ollama (LLM API OpenAI-compatible trên cổng 11434).
# Sau lần đầu `docker compose up -d`, kéo model (một lần hoặc khi đổi model):
#   docker compose exec ollama ollama pull qwen2.5:0.5b
#
# Chạy API trong Docker: VLLM_API_URL trỏ tới service `ollama`.
# Chạy API trên máy (venv): .env đặt VLLM_API_URL=http://127.0.0.1:11434
#
# Neo4j publish host: 17474 (browser), 17687 (bolt) — tránh trùng instance khác trên 7474/7687.
# Uvicorn trên Windows → container Neo4j: NEO4J_URI=bolt://localhost:17687

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api

    ports:
      - "8000:8000"

    environment:
      VLLM_API_URL: http://ollama:11434
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:0.5b}

    depends_on:
      - redis
      - neo4j
      - ollama

  redis:
    image: redis/redis-stack:latest

    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5

    environment:
      NEO4J_AUTH: neo4j/password

    ports:
      - "17474:7474"
      - "17687:7687"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
