services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api

    ports:
      - "8000:8000"

    depends_on:
      - redis
      - neo4j

  redis:
    image: redis/redis-stack:latest

    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5

    environment:
      NEO4J_AUTH: neo4j/password

    ports:
      - "7474:7474"
      - "7687:7687"

  vllm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vllm

    ports:
      - "8001:8001"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]